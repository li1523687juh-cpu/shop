<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>一码多付 · 店铺</title>

<style>
:root {
  --green:#07C160; --green-d:#06AD56; --blue:#1677FF; --blue-d:#0958D9;
  --red:#EE0A24; --orange:#FF976A; --bg:#F5F5F5; --card:#FFF;
  --text:#333; --text2:#999; --border:#EBEDF0; --radius:12px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:env(safe-area-inset-bottom,0px)}
body.buyer{padding-bottom:calc(65px + env(safe-area-inset-bottom,0px))} body.seller{padding-bottom:calc(58px + env(safe-area-inset-bottom,0px))}
#app{min-height:100vh}
/* Toast */
#toast-c{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 24px;border-radius:8px;color:#fff;font-size:14px;white-space:nowrap;animation:dIn 0.3s ease}
.toast.ok{background:var(--green)} .toast.err{background:var(--red)}
@keyframes dIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
/* Buttons */
.btn{display:inline-block;padding:12px 24px;border-radius:8px;border:none;font-size:16px;cursor:pointer;transition:.2s;text-align:center;text-decoration:none}
.btn-g{background:var(--green);color:#fff}.btn-g:hover{background:var(--green-d)}
.btn-b{background:var(--blue);color:#fff}.btn-b:hover{background:var(--blue-d)}
.btn-r{background:var(--red);color:#fff}
.btn-o{background:var(--orange);color:#fff}
.btn-blk{display:block;width:100%}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-lg{padding:16px 0;font-size:18px;font-weight:700;border-radius:12px}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-gray{background:#f0f0f0;color:var(--text)}
/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
/* Forms */
.inp{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);font-size:14px;outline:none;margin-bottom:10px}
.inp:focus{border-color:var(--green)}
/* Buyer Bottom Nav */
#buyer-nav{position:fixed;bottom:0;left:0;right:0;height:58px;background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;z-index:100}
#buyer-nav a{display:flex;flex-direction:column;align-items:center;color:var(--text2);text-decoration:none;font-size:11px;gap:2px}
#buyer-nav a.ac{color:var(--green)} #buyer-nav a i{font-size:20px}
.badge{position:relative} .badge em{position:absolute;top:-6px;right:-10px;background:var(--red);color:#fff;font-size:10px;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-style:normal}
/* Seller Sidebar (mobile: bottom bar, desktop: sidebar) */
#seller-nav{position:fixed;bottom:0;left:0;right:0;height:58px;background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;z-index:100}
#seller-nav a{display:flex;flex-direction:column;align-items:center;color:var(--text2);text-decoration:none;font-size:11px;gap:2px}
#seller-nav a.ac{color:var(--blue)} #seller-nav a i{font-size:20px}
/* Product Grid */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(162px,1fr));gap:12px}
.pcard{border-radius:var(--radius);overflow:hidden;background:var(--card);box-shadow:var(--shadow);display:flex;flex-direction:column}
.pimg{width:100%;padding-top:100%;position:relative;background:#f0f0f0;overflow:hidden}
.pimg img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.pimg .soldout{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.pinfo{padding:10px;flex:1;display:flex;flex-direction:column}
.pinfo h3{font-size:14px;font-weight:600;margin-bottom:4px;line-height:1.3}
.pinfo .pr{color:var(--red);font-size:16px;font-weight:700;margin-bottom:4px}
.pinfo .sk{color:var(--text2);font-size:11px}
/* Cart */
.citem{display:flex;gap:12px;background:var(--card);border-radius:var(--radius);padding:12px;margin-bottom:10px;box-shadow:var(--shadow)}
.citem img{width:80px;height:80px;border-radius:8px;object-fit:cover;background:#f0f0f0}
.citem .ci{flex:1}
.citem h4{font-size:14px;font-weight:600}
.citem .pr{color:var(--red);font-weight:700;font-size:15px;margin:4px 0}
.qty-c{display:flex;align-items:center;gap:8px;margin-top:8px}
.qty-b{width:28px;height:28px;border-radius:14px;border:1px solid var(--border);background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-v{min-width:24px;text-align:center;font-weight:600}
/* Checkout */
.pay-opts{display:flex;gap:12px;margin-bottom:20px}
.pay-opt{flex:1;padding:16px;border-radius:var(--radius);border:2px solid var(--border);cursor:pointer;text-align:center;transition:.2s}
.pay-opt.sel-wx{border-color:var(--green);background:#f0fdf4}
.pay-opt.sel-ali{border-color:var(--blue);background:#eff6ff}
.pay-opt i{font-size:32px}
.pay-opt p{margin-top:8px;font-weight:600}
/* Badges */
.badge-s{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-s.PAID{background:#f0fdf4;color:var(--green)}
.badge-s.PENDING{background:#fff7ed;color:var(--orange)}
.badge-s.EXPIRED,.badge-s.CANCELLED{background:#f5f5f5;color:var(--text2)}
/* Center */
.cen{text-align:center;padding:60px 20px}
.cen i{font-size:48px;color:#ddd;margin-bottom:16px}
.cen p{color:var(--text2);margin:8px 0 16px}
/* Headers */
h2{font-size:20px;font-weight:700;padding:16px 0 12px}
h3{font-size:16px;font-weight:600;margin-bottom:12px}
/* Fix bottom */
.fix-bot{position:fixed;bottom:58px;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:99}
.fix-bot .amt{font-size:20px;font-weight:700;color:var(--red)}
/* Split */
.sp{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.sp .l{color:var(--text2)} .sp .r{font-weight:600}
.sp.tot{border-top:1px solid var(--border);padding-top:12px;margin-top:8px}
.sp.tot .l{font-size:18px;font-weight:700;color:var(--text)}
.sp.tot .r{font-size:22px;font-weight:700;color:var(--red)}
/* QR */
.qr-box{display:flex;flex-direction:column;align-items:center;padding:24px 0}
/* Login page */
.login-box{max-width:400px;margin:0 auto;padding:40px 20px}
.login-role-btn{display:flex;align-items:center;justify-content:center;gap:12px;padding:18px 0;border-radius:12px;border:none;font-size:18px;font-weight:600;cursor:pointer;color:#fff;width:100%;margin-bottom:14px;transition:.2s}
.login-role-btn.wx{background:var(--green)} .login-role-btn.wx:hover{background:var(--green-d)}
.login-role-btn.ali{background:var(--blue)} .login-role-btn.ali:hover{background:var(--blue-d)}
.login-role-btn.seller{background:#333;color:#fff} .login-role-btn.seller:hover{background:#555}
.login-role-btn i{font-size:28px}
.role-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text2);font-size:13px}
.role-divider::before,.role-divider::after{content:'';flex:1;height:1px;background:var(--border)}
/* Header bar */
.top-bar{background:var(--card);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.top-bar .title{font-size:18px;font-weight:700}
.top-bar .role-tag{font-size:11px;padding:4px 10px;border-radius:12px;font-weight:600}
.top-bar .role-tag.buyer{background:#f0fdf4;color:var(--green)}
.top-bar .role-tag.seller{background:#f5f5f5;color:#333}
/* Stats grid */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow)}
.stat-card .val{font-size:20px;font-weight:700;color:var(--red)}
.stat-card .lbl{font-size:12px;color:var(--text2);margin-top:4px}
/* Seller product list */
.sprod-row{display:flex;gap:10px;align-items:center;background:var(--card);border-radius:var(--radius);padding:10px;margin-bottom:8px;box-shadow:var(--shadow)}
.sprod-row img{width:56px;height:56px;border-radius:6px;object-fit:cover;background:#f0f0f0}
.sprod-row .info{flex:1}
.sprod-row .info h4{font-size:14px;font-weight:600}
.sprod-row .info p{font-size:12px;color:var(--text2);margin-top:2px}
/* Action bar */
.act-bar{display:flex;gap:8px;margin:16px 0}
/* Modal */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal .mc{background:#fff;border-radius:var(--radius);padding:24px;max-width:420px;width:92%;max-height:85vh;overflow-y:auto}
.modal h3{margin-bottom:16px;font-size:18px}
/* Padded */
.pad{padding:12px}
/* Gray text */
.gray{color:var(--text2);font-size:12px}
</style>
</head>

// 云端写入辅助
async function _sbUpsertProducts(products){
  if(!_sbReady) return;
  try {
    for(const p of products){
      await SB.from('products').upsert({
        id:p.id, name:p.name, price:p.price, stock:p.stock,
        image:p.image, description:p.desc||'', listed:p.listed!==false,
        created_at:p.createdAt||new Date().toISOString()
      });
    }
  } catch(e){ console.log('SB sync err',e); }
}

async function _sbDeleteProduct(id){
  if(!_sbReady) return;
  try { await SB.from('products').delete().eq('id',id); } catch(e){}
}

async function _sbInsertOrder(order){
  if(!_sbReady) return;
  try {
    await SB.from('orders').insert({
      id:order.id, out_trade_no:order.outTradeNo, user_id:order.userId||'',
      total_amount:order.totalAmount, status:order.status,
      payment_channel:order.paymentChannel, buyer:order.buyer||'',
      paid_at:order.paidAt, created_at:order.createdAt
    });
    for(const item of (order.items||[])){
      await SB.from('order_items').insert({
        order_id:order.id, product_id:item.productId,
        product_name:item.name, product_image:item.image,
        quantity:item.quantity, price:item.price
      });
    }
  } catch(e){ console.log('SB order err',e); }
}

async function _sbUpdateOrderStatus(id, status, paidAt){
  if(!_sbReady) return;
  try { await SB.from('orders').update({status, paid_at:paidAt}).eq('id',id); } catch(e){}
}

async function _sbToggleFav(userId, productId, add){
  if(!_sbReady) return;
  try {
    if(add) await SB.from('favorites').upsert({user_id:userId, product_id:productId});
    else await SB.from('favorites').delete().eq('user_id',userId).eq('product_id',productId);
  } catch(e){}
}

function getFavs(){ return LS.get('favs',[]); }

function toggleFav(pid){ const f=getFavs(); const i=f.indexOf(pid); if(i>-1){ f.splice(i,1); _sbToggleFav(getUser()?.id,pid,false); } else { f.push(pid); _sbToggleFav(getUser()?.id,pid,true); } saveFavs(f); }
function isFav(pid){ return getFavs().includes(pid); }

function saveUser(u){ LS.set('user',u); }
function getAddresses(){ return LS.get('addresses',[]); }
function saveAddress(a){
  const addrs = getAddresses();
  addrs.unshift(a);
  if(addrs.length > 10) addrs.pop();
  LS.set('addresses', addrs);
}

function toast(msg,type='ok'){
  const c=document.getElementById('toast-c');

}

// ==================== ROUTER ====================
let role=''; // 'buyer' | 'seller'
let buyerPage='shop';
let sellerPage='dashboard';
let cartCount=0;

let _detailPid = '';
function goBuyer(p){ closeCheckout(); buyerPage=p; role='buyer'; render(); }
function goDetail(pid){ _detailPid=pid; buyerPage='detail'; role='buyer'; render(); }
function goSeller(p){ sellerPage=p; role='seller'; render(); }
function goLogin(){ role=''; saveUser(null); _loginMode='all'; render(); }
function switchRole(r){ role=r; if(r==='buyer') buyerPage='shop'; else sellerPage='dashboard'; render(); }

function render(){
  const app=document.getElementById('app');
  const nav=document.getElementById('nav-area');
  const user=getUser();

  if(!user){ renderLogin(app, _loginMode); nav.innerHTML=''; return; }

  if(role==='seller'){
    document.body.className='seller';
    app.style.paddingBottom='0';
    nav.innerHTML = `
    <div id="seller-nav">
      <a href="#" class="${sellerPage==='dashboard'?'ac':''}" onclick="goSeller('dashboard');return false"><i class="fas fa-chart-line"></i>数据</a>
      <a href="#" class="${sellerPage==='products'?'ac':''}" onclick="goSeller('products');return false"><i class="fas fa-boxes"></i>商品</a>
    </div>`;
    app.style.paddingBottom='65px';
    switch(sellerPage){
      case 'dashboard': renderSellerDashboard(app); break;
      case 'products': renderSellerProducts(app); break;
      case 'orders': renderSellerOrders(app); break;
    }
  } else {
    role='buyer';
    document.body.className='buyer';
    // 导航始终显示

function buyerAddCart(pid){
  const products=getProducts();
  const p=products.find(x=>x.id===pid);
  if(!p||p.stock<=0){toast('已售罄','err');return;}
  const cart=getCart();
  const ex=cart.find(i=>i.productId===pid);
  if(ex){ if(ex.quantity>=p.stock){toast('库存不足','err');return;} ex.quantity++; }
  else { cart.push({productId:p.id,name:p.name,image:p.image,price:p.price,quantity:1,stock:p.stock}); }
  saveCart(cart); cartCount=cart.reduce((s,i)=>s+i.quantity,0);
  toast('已加入: '+p.name); render();
}

function chgQty(pid,qty){
  const cart=getCart();
  if(qty<=0){rmCart(pid);return;}
  const item=cart.find(i=>i.productId===pid);
  if(item){ if(qty>item.stock){toast('库存不足','err');return;} item.quantity=qty; }
  saveCart(cart); cartCount=cart.reduce((s,i)=>s+i.quantity,0); render();
}

function rmCart(pid){
  saveCart(getCart().filter(i=>i.productId!==pid));
  cartCount=getCart().reduce((s,i)=>s+i.quantity,0); render();
}

// 三级联动
function addrProvChange(keepCity){
  const prov = document.getElementById('addr-prov').value;
  const citySel = document.getElementById('addr-city');
  const distSel = document.getElementById('addr-dist');
  const data = REGIONS[prov];
  if(!data){ citySel.innerHTML='<option value="">请选择城市</option>'; distSel.innerHTML='<option value="">请选择区/县</option>'; return; }
  if(Array.isArray(data)){
    // 直辖市/特区：没有城市，直接显示区县
    citySel.innerHTML = '<option value="'+prov+'">'+prov+'</option>';
    distSel.innerHTML = '<option value="">请选择区/县</option>'+data.map(d=>`<option value="${d}">${d}</option>`).join('');
  } else {
    // 普通省：显示城市列表
    const cities = Object.keys(data);
    citySel.innerHTML = '<option value="">请选择城市</option>'+cities.map(c=>`<option value="${c}">${c}</option>`).join('');
    distSel.innerHTML = '<option value="">请选择区/县</option>';
  }
}
function addrCityChange(keepDist){
  const prov = document.getElementById('addr-prov').value;
  const city = document.getElementById('addr-city').value;
  const data = REGIONS[prov];
  const distSel = document.getElementById('addr-dist');
  if(!data||!city){ distSel.innerHTML='<option value="">请选择区/县</option>'; return; }
  if(Array.isArray(data)){
    // 直辖市：data 就是区县列表
    distSel.innerHTML = '<option value="">请选择区/县</option>'+data.map(d=>`<option value="${d}">${d}</option>`).join('');
  } else {
    // 普通省：data[city] 是区县列表
    const dists = data[city]||[];
    distSel.innerHTML = '<option value="">请选择区/县</option>'+dists.map(d=>`<option value="${d}">${d}</option>`).join('');
  }
}

function getAddrFromForm(){
  return {
    name: document.getElementById('addr-name')?.value.trim()||'',
    phone: document.getElementById('addr-phone')?.value.trim()||'',
    prov: document.getElementById('addr-prov')?.value||'',
    city: document.getElementById('addr-city')?.value||'',
    dist: document.getElementById('addr-dist')?.value||'',
    detail: document.getElementById('addr-detail')?.value.trim()||'',
    full: ''
  };
}
function addrToString(a){
  const parts = [a.prov];
  if(a.city&&a.city!==a.prov) parts.push(a.city);
  if(a.dist) parts.push(a.dist);
  if(a.detail) parts.push(a.detail);
  return parts.join('');
}


function closeCheckout(){
  const o = document.getElementById('checkout-overlay');
  if(o) o.remove();
}

function selPayModal(ch){
  payChannel=ch;
  const cart=getCart(); const total=cart.reduce((s,i)=>s+i.price*i.quantity,0);
  document.getElementById('co-wx').className = 'pay-opt '+(ch==='wechat'?'sel-wx':'');
  document.getElementById('co-ali').className = 'pay-opt '+(ch==='alipay'?'sel-ali':'');
  const btn = document.getElementById('pay-btn');
  btn.style.background = ch==='wechat'?'var(--green)':'var(--blue)';
  btn.innerHTML = '<i class="fab fa-'+(ch==='wechat'?'weixin':'alipay')+'"></i> 确认支付 '+F(total);
}

function doPayModal(){
  const cart=getCart();
  if(cart.length===0)return;
  const total=cart.reduce((s,i)=>s+i.price*i.quantity,0);

  // 收货地址
  const addr = getAddrFromForm();
  if(!addr.name){ toast('请填写收件人姓名','err'); return; }
  if(!addr.phone||!/^1\d{10}$/.test(addr.phone)){ toast('请填写正确的手机号','err'); return; }
  if(!addr.prov||!addr.city||!addr.detail){ toast('请完善收货地址','err'); return; }
  addr.full = addrToString(addr);
  saveAddress(addr);

  const order={
    id:uid(), outTradeNo:OTN(),
    items:cart.map(i=>({...i})),
    totalAmount:total, status:'PENDING', paymentChannel:payChannel,
    buyer:getUser()?.name||'匿名用户',
    address: addr,
    paidAt:null, createdAt:new Date().toISOString()
  };

  const orders=getOrders(); orders.unshift(order); saveOrders(orders);

  const products=getProducts();
  cart.forEach(ci=>{ const p=products.find(x=>x.id===ci.productId); if(p) p.stock=Math.max(0,p.stock-ci.quantity); });
  saveProducts(products);
  saveCart([]); cartCount=0;
  LS.set('_lastOrder',order);

  // 替换弹窗内容为支付模拟
  const overlay = document.getElementById('checkout-overlay');
  if(overlay){
    overlay.innerHTML = `
    <div style="background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:16px" onclick="event.stopPropagation()">
      <div style="text-align:center;padding:20px 0">
        <i class="fas fa-clock" style="font-size:48px;color:var(--orange)"></i>
        <h3 style="margin:12px 0 4px">等待支付</h3>
        <p style="font-size:12px;color:var(--text2)">订单号: ${order.outTradeNo}</p>
        <p style="font-size:22px;font-weight:700;color:var(--red);margin:6px 0">${F(total)}</p>
        <p style="font-weight:600;font-size:14px">${payChannel==='wechat'?'微信支付':'支付宝'}</p>
        <div style="width:160px;height:160px;margin:16px auto;background:#f0f0f0;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed var(--border)">
          <i class="fab fa-${payChannel==='wechat'?'weixin':'alipay'}" style="font-size:40px;color:${payChannel==='wechat'?'var(--green)':'var(--blue)'}"></i>
          <p style="font-size:11px;color:var(--text2);margin-top:6px">模拟收款码</p>
        </div>
        <p style="font-size:12px;color:var(--text2);margin-bottom:16px">开发模式</p>
        <button class="btn btn-g btn-blk" style="margin-bottom:8px" onclick="mockPaySuccessModal('${order.id}')">💰 一键模拟支付成功</button>
        <button class="btn btn-gray btn-blk" onclick="closeCheckout();goBuyer('shop')">取消</button>
        <div style="height:16px"></div>
      </div>
    </div>`;
  }
}

function mockPaySuccessModal(orderId){
  const orders=getOrders();
  const order=orders.find(o=>o.id===orderId);
  if(order){ order.status='PAID'; order.paidAt=new Date().toISOString(); saveOrders(orders); LS.set('_lastOrder',order); }

  // Show success in modal
  const overlay = document.getElementById('checkout-overlay');
  if(overlay){
    overlay.innerHTML = `
    <div style="background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:16px;text-align:center" onclick="event.stopPropagation()">

      <p style="font-size:12px;color:var(--text2)">${order.paymentChannel==='wechat'?'微信支付':'支付宝'}</p>
      ${order.address ? `
      <div style="background:#f9fafb;border-radius:8px;padding:10px;margin-top:10px;text-align:left;font-size:13px">
        <p style="font-weight:600;margin-bottom:4px">📍 收货地址</p>

    ${o.paidAt?`<div class="sp"><span class="l">支付时间</span><span class="r" style="font-size:13px">${dt(o.paidAt)}</span></div>`:''}
    <div class="sp tot"><span class="l">订单金额</span><span class="r">${F(o.totalAmount)}</span></div>

    ${o.status==='PAID'?`<button class="btn btn-g btn-blk" style="margin-top:12px" onclick="shipOrder('${o.id}');this.closest('[style*=fixed]').remove();">📦 标记已发货</button>`:''}
    ${o.status==='SHIPPED'?`<button class="btn btn-b btn-blk" style="margin-top:12px" onclick="completeOrder('${o.id}');this.closest('[style*=fixed]').remove();">✅ 标记已完成</button>`:''}
  </div>`;
  document.body.appendChild(overlay);
}

function renderSellerDashboard(app){
  const orders = getOrders();
  const paid = orders.filter(o => o.status === 'PAID');
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const yesterdayStart = new Date(todayStart); yesterdayStart.setDate(yesterdayStart.getDate()-1);
  const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);
  const today = paid.filter(o => new Date(o.paidAt) >= todayStart).reduce((s,o) => s+o.totalAmount, 0);
  const yesterday = paid.filter(o => new Date(o.paidAt) >= yesterdayStart && new Date(o.paidAt) < todayStart).reduce((s,o) => s+o.totalAmount, 0);
  const month = paid.filter(o => new Date(o.paidAt) >= monthStart).reduce((s,o) => s+o.totalAmount, 0);
  const totalR = paid.reduce((s,o) => s+o.totalAmount, 0);
  const pending = orders.filter(o => o.status === 'PENDING').length;
  const todayCount = paid.filter(o => new Date(o.paidAt) >= todayStart).length;

  // 生成每日数据
  const dailyData = [];
  for(let i = _chartDays-1; i >= 0; i--){
    const d = new Date(todayStart);
    d.setDate(d.getDate() - i);
    const dayStart = new Date(d); dayStart.setHours(0,0,0,0);
    const dayEnd = new Date(d); dayEnd.setHours(23,59,59,999);
    const dayPaid = paid.filter(o => { const t = new Date(o.paidAt); return t >= dayStart && t <= dayEnd; });
    dailyData.push({
      date: d,
      label: i===0?'今天':(i===1?'昨天':`${d.getMonth()+1}/${d.getDate()}`),
      amount: dayPaid.reduce((s,o)=>s+o.totalAmount, 0),
      count: dayPaid.length
    });
  }

  const maxAmount = Math.max(...dailyData.map(d=>d.amount), 1);
  const barColor = (i) => i === dailyData.length-1 ? 'var(--green)' : 'var(--green-d)';

  let html = `
<div class="top-bar"><span class="title">📊 数据看板</span><span class="role-tag seller">卖家</span></div>
<div class="pad">

  <!-- 概览卡片 -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="val">${F(today)}</div>
      <div class="lbl">今日收入 ${todayCount>0?`(${todayCount}单)`:'(-)'}</div>
    </div>
    <div class="stat-card">
      <div class="val">${F(yesterday)}</div>
      <div class="lbl">昨日收入</div>
    </div>
    <div class="stat-card">
      <div class="val">${F(month)}</div>
      <div class="lbl">本月收入</div>
    </div>
  </div>

  <div class="stat-grid" style="margin-top:10px;grid-template-columns:repeat(4,1fr)">
    <div class="stat-card"><div class="val" style="font-size:16px;color:var(--red)">${F(totalR)}</div><div class="lbl">总收入</div></div>
    <div class="stat-card"><div class="val" style="font-size:16px;color:var(--text)">${orders.length}</div><div class="lbl">总订单</div></div>
    <div class="stat-card"><div class="val" style="font-size:16px;color:var(--orange)">${pending}</div><div class="lbl">待付款</div></div>
    <div class="stat-card"><div class="val" style="font-size:16px;color:var(--blue)">${getProducts().filter(p=>p.listed).length}</div><div class="lbl">在售</div></div>
  </div>

  <!-- 数据对比区域 -->
  <div class="card" style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="margin:0">📈 成交趋势</h3>
      <div style="display:flex;gap:4px">
        <button class="btn btn-sm" style="padding:5px 14px;font-size:12px;${_chartDays===7?'background:var(--green);color:#fff;border-color:var(--green)':'background:#fff;color:var(--text);border:1px solid var(--border)'}" onclick="_chartDays=7;renderSellerDashboard(document.getElementById('app'))">近7天</button>
        <button class="btn btn-sm" style="padding:5px 14px;font-size:12px;${_chartDays===30?'background:var(--green);color:#fff;border-color:var(--green)':'background:#fff;color:var(--text);border:1px solid var(--border)'}" onclick="_chartDays=30;renderSellerDashboard(document.getElementById('app'))">近30天</button>
      </div>
    </div>

    <!-- 柱状图 -->
    <div style="overflow-x:auto;padding-bottom:6px">
      <div style="display:flex;align-items:flex-end;gap:${_chartDays===30?'1px':'6px'};height:140px;min-width:${_chartDays===30?'900px':'auto'};padding:0 2px">
        ${dailyData.map((d,i) => {
          const w = _chartDays===30 ? '30px' : (100/dailyData.length+'%');
          return `
          <div style="flex:1;min-width:${w};max-width:${w};display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end">
            <span style="font-size:9px;color:var(--green);font-weight:600;margin-bottom:2px;white-space:nowrap">${d.amount>0?F(d.amount).replace('¥',''):''}</span>
            <div style="width:70%;max-width:28px;background:${barColor(i)};border-radius:3px 3px 0 0;height:${Math.max(d.amount/maxAmount*100,3)}%;min-height:4px" title="${d.label}: ${F(d.amount)} · ${d.count}单"></div>
            <span style="font-size:9px;color:var(--text2);margin-top:6px;white-space:nowrap">${_chartDays===30?d.label:d.label}</span>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- 数据列表 -->
    <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:8px;max-height:${_chartDays===30?'300px':'auto'};overflow-y:auto">
      <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:12px;color:var(--text2);font-weight:600">
        <span style="width:50px">日期</span><span style="flex:1;text-align:right">成交额</span><span style="width:50px;text-align:right">单数</span><span style="width:60px;text-align:right">环比</span>
      </div>
      ${dailyData.map((d,i) => {
        const prev = i>0 ? dailyData[i-1].amount : 0;
        const change = prev>0 ? ((d.amount-prev)/prev*100).toFixed(1) : (d.amount>0?'+100':'0');
        const changeColor = parseFloat(change)>0 ? 'var(--green)' : parseFloat(change)<0 ? 'var(--red)' : 'var(--text2)';
        return `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px;border-bottom:1px solid var(--border)">
          <span style="width:50px;font-weight:${d.label==='今天'?'700':'400'};color:${d.label==='今天'?'var(--green)':'var(--text)'}">${d.label}</span>
          <span style="flex:1;text-align:right;font-weight:600">${F(d.amount)}</span>
          <span style="width:50px;text-align:right;color:var(--text2)">${d.count}单</span>
          <span style="width:60px;text-align:right;font-size:12px;color:${changeColor}">${parseFloat(change)>0?'+':''}${change}%</span>
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- 快捷入口 -->
  <div class="act-bar">
    <button class="btn btn-b btn-blk" onclick="goSeller('products')"><i class="fas fa-plus"></i> 管理商品</button>
  </div>

  <!-- 最近订单 -->
  <h3>📋 最近订单</h3>`;

  orders.slice(0,8).forEach(o => {
    html += `
    <div class="card" style="font-size:13px;cursor:pointer" onclick="showOrderDetail('${o.id}')">
      <div class="sp"><span>${o.outTradeNo}</span><span class="badge-s ${o.status}">${o.status}</span></div>
      <div style="color:var(--text2);margin:4px 0">${o.items?.map(i=>i.name+'×'+i.quantity).join('，')} | ${o.buyer||''}</div>
      ${o.address ? `<div style="font-size:11px;color:var(--text2);margin:2px 0">📍 ${o.address.name} ${o.address.phone} ${o.address.full}</div>` : ''}
      <div class="sp"><span style="color:var(--text2);font-size:11px">${o.paymentChannel==='wechat'?'微信':'支付宝'} · ${dt(o.createdAt)}</span><span style="font-weight:700">${F(o.totalAmount)}</span></div>
    </div>`;
  });

  html += `</div>`;
  app.innerHTML = html;
}

// ==================== SELLER: PRODUCTS ====================
function renderSellerProducts(app){
  const products=getProducts();
  let html=`
<div class="top-bar"><span class="title">📦 商品管理</span><span class="role-tag seller">卖家</span></div>
<div class="pad">
  <div class="card">
    <h3>➕ 添加新商品</h3>
    <input class="inp" id="sf-name" placeholder="商品名称 *">
    <input class="inp" id="sf-price" type="number" step="0.01" placeholder="价格（元）*">
    <input class="inp" id="sf-stock" type="number" placeholder="库存数量">
    <input class="inp" id="sf-img" placeholder="图片URL">
    <input class="inp" id="sf-desc" placeholder="商品描述">
    <button class="btn btn-g btn-blk" onclick="sellerAddProduct()">上架商品</button>
  </div>

  <h3>商品列表 (${products.length})</h3>`;

  products.forEach(p=>{
    html+=`
    <div class="sprod-row">
      <img src="${p.image}" alt="${p.name}" onerror="this.style.display='none'">
      <div class="info">
        <h4>${p.name} ${p.listed?'':'<span style="color:var(--text2);font-size:11px">(已下架)</span>'}</h4>
        <p>${F(p.price)} | 库存: ${p.stock} | ${p.desc||''}</p>
      </div>
      <button style="border:none;background:none;color:var(--red);cursor:pointer;font-size:16px" onclick="sellerDelProduct('${p.id}')"><i class="fas fa-trash"></i></button>
    </div>`;
  });

  html+=`</div>`; app.innerHTML=html;
}

function sellerAddProduct(){
  const name=document.getElementById('sf-name')?.value.trim();
  const price=parseFloat(document.getElementById('sf-price')?.value);
  const stock=parseInt(document.getElementById('sf-stock')?.value)||0;
  const image=document.getElementById('sf-img')?.value.trim();
  const desc=document.getElementById('sf-desc')?.value.trim();
  if(!name||!price||price<=0){toast('商品名称和价格不能为空','err');return;}
  if(!image){toast('请输入图片URL','err');return;}
  const products=getProducts();
  products.unshift({id:uid(),name,price:Math.round(price*100),stock,image,desc:desc||'',listed:true,createdAt:new Date().toISOString()});
  saveProducts(products);
  toast('商品已上架: '+name);
  goSeller('products');
}

function sellerDelProduct(id){
  if(!confirm('确定删除？'))return;
  saveProducts(getProducts().filter(p=>p.id!==id));
  _sbDeleteProduct(id);
  toast('已删除');
  goSeller('products');
}

// ==================== SELLER: ORDERS ====================
function renderSellerOrders(app){
  const orders=getOrders();
  let html=`<div class="top-bar"><span class="title">📋 全部订单</span><span class="role-tag seller">卖家</span></div><div class="pad">`;

  if(orders.length===0){
    html+=`<div class="cen"><i class="fas fa-receipt"></i><p>暂无订单</p></div>`;
  } else {
    const sMap={PENDING:'待付款',PAID:'已付款',SHIPPED:'已发货',COMPLETED:'已完成',CANCELLED:'已取消',EXPIRED:'已过期'};
    orders.forEach(o=>{
      html+=`
      <div class="card" style="font-size:13px;cursor:pointer" onclick="showOrderDetail('${o.id}')">
        <div class="sp"><span style="font-size:12px;color:var(--text2)">${o.outTradeNo}</span><span class="badge-s ${o.status}">${sMap[o.status]||o.status}</span></div>
        <div style="color:var(--text2);margin:4px 0">${o.items?.map(i=>i.name+'×'+i.quantity).join('，')||''}</div>
        ${o.address ? `<div style="font-size:12px;color:var(--text);margin:4px 0;background:#f0fdf4;padding:6px 8px;border-radius:6px">📍 ${o.address.name} · ${o.address.phone}<br><span style="color:var(--text2);font-size:11px">${o.address.full}</span></div>` : ''}
        <div style="font-size:11px;color:var(--text2)">买家: ${o.buyer||'未知'} | ${o.paymentChannel==='wechat'?'微信':'支付宝'} | ${dt(o.createdAt)}</div>
        <div class="sp"><span></span><span style="font-weight:700;font-size:16px">${F(o.totalAmount)}</span></div>
        ${o.status==='PAID'?`<button class="btn btn-g btn-sm" style="margin-top:8px;width:100%" onclick="shipOrder('${o.id}')">📦 标记已发货</button>`:''}
        ${o.status==='SHIPPED'?`<button class="btn btn-b btn-sm" style="margin-top:8px;width:100%" onclick="completeOrder('${o.id}')">✅ 标记已完成</button>`:''}
      </div>`;
    });
  }
  html+=`</div>`; app.innerHTML=html;
}

function shipOrder(id){
  const orders=getOrders();
  const o=orders.find(x=>x.id===id);
  if(o){ o.status='SHIPPED'; saveOrders(orders); _sbUpdateOrderStatus(o.id,'SHIPPED',null); toast('已标记发货'); goSeller('orders'); }
}

function completeOrder(id){
  const orders=getOrders();
  const o=orders.find(x=>x.id===id);
  if(o){ o.status='COMPLETED'; saveOrders(orders); _sbUpdateOrderStatus(o.id,'COMPLETED',null); toast('订单已完成'); goSeller('orders'); }
}

// ==================== HASH ROUTING ====================
let _loginMode='buyer'; // hash 决定进入哪个登录页

function handleHash(){
  const h=window.location.hash.slice(1);
  const user=getUser();

  // 无用户：根据 hash 显示不同的登录页
  if(!user){
    role='';
    if(h==='admin'||h==='seller'){ _loginMode='seller'; }
    else if(h==='login'){ _loginMode='all'; }
    else { _loginMode='buyer'; }
    render();
    return;
  }

  // 已登录：根据 hash 切换到对应角色（跨角色时清除旧身份）
  if(h==='admin'||h==='seller'){
    if(user.channel!=='seller'){ saveUser(null); role=''; _loginMode='seller'; render(); return; }
    switchRole('seller');
  }
  else if(h==='shop'||h==='cart'||h==='orders'||h==='checkout'||h==='result'){
    if(user.channel==='seller'){ saveUser(null); role=''; _loginMode='buyer'; render(); return; }
    switchRole('buyer'); if(h!=='result') buyerPage=h;
  }
  else { switchRole(role||'buyer'); }
}

window.addEventListener('hashchange',handleHash);

// 初始加载：根据 hash 决定
const _initHash = window.location.hash.slice(1);
if(_initHash==='admin'||_initHash==='seller'){
  _loginMode='seller';
  const u = getUser();
  if(!u){ role=''; render(); }
  else if(u.channel==='seller'){ role='seller'; sellerPage='dashboard'; render(); }
  else { saveUser(null); role=''; render(); } // 之前是买家，清掉重新登录卖家
} else {
  _loginMode='buyer';
  if(!getUser()){ role=''; render(); } else { role='buyer'; buyerPage='shop'; render(); }
}
</script>
