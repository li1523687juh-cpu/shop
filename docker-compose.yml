version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: shop-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop123
      POSTGRES_DB: shop_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
